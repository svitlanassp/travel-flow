<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelFlow - My Trips</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            
            <a href="index.html" class="logo-group">
                <div class="logo-placeholder">
                    <img src="icons/logo.svg" alt="TravelFlow Logo">
                </div>
                <span class="brand-name">TravelFlow</span>
            </a>
            
            <div class="user-profile-group">
                
                <a href="login.html" class="logout-btn" title="Logout">
                    <img src="icons/logout.svg" alt="Logout">
                </a>

                <a href="users.html" class="profile-placeholder" title="User Management">
                    <img src="icons/user.svg" alt="User Profile">
                </a>
            </div>

        </div>
    </header>

    <main class="content-wrapper">
        <section class="section-header">
            <h1>My Trips</h1>
            <button class="btn-add" id="btn-open-modal">Add Trip</button>
        </section>

        <section class="trips-grid" id="trips-grid"></section>

    </main>

    <div class="modal-overlay" id="trip-modal" style="display:none;">
        <div class="form-modal-card">
            <h2>New Trip</h2>
            <form id="add-trip-form" class="form-content">
                <div class="fields-group">
                    <div class="form-group">
                        <label>Trip Title</label>
                        <input type="text" id="trip-title" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Country</label>
                            <input type="text" id="trip-country">
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" id="trip-city">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Start Date</label>
                            <input type="date" id="trip-start">
                        </div>
                        <div class="form-group">
                            <label>End Date</label>
                            <input type="date" id="trip-end">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Budget</label>
                        <input type="number" id="trip-budget">
                    </div>
                    <div class="form-group">
                        <label>Cover Photo</label>
                        <input type="file" id="trip-photo" accept="image/*">
                    </div>
                </div>
                <div class="form-footer">
                    <button type="button" class="btn-secondary" id="btn-close-modal">Cancel</button>
                    <button type="submit" class="btn-ok">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="edit-trip-modal" style="display:none;">
        <div class="form-modal-card">
            <h2>Edit Trip</h2>
            <form id="edit-trip-form" class="form-content">
                <div class="fields-group">
                    <div class="form-group">
                        <label>Trip Title</label>
                        <input type="text" id="edit-trip-title">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Country</label>
                            <input type="text" id="edit-trip-country">
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" id="edit-trip-city">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Start Date</label>
                            <input type="date" id="edit-trip-start">
                        </div>
                        <div class="form-group">
                            <label>End Date</label>
                            <input type="date" id="edit-trip-end">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Budget</label>
                        <input type="number" id="edit-trip-budget">
                    </div>
                    <div class="form-group">
                        <label>Cover Photo</label>
                        <input type="file" id="edit-trip-photo" accept="image/*">
                    </div>
                </div>
                <div class="form-footer">
                    <button type="button" class="btn-secondary" id="btn-close-edit-modal">Cancel</button>
                    <button type="submit" class="btn-ok">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="delete-trip-modal" style="display:none;">
        <div class="confirm-card">
            <h2>Delete Confirmation</h2>
            <p>Are you sure you want to delete this trip? <strong>This action can't be undone</strong></p>
            <div class="confirm-actions">
                <button type="button" class="btn-secondary" id="btn-close-delete-modal">Cancel</button>
                <button type="button" class="btn-ok" id="btn-confirm-delete">Delete</button>
            </div>
        </div>
    </div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/index.js"></script>

</body>
</html>

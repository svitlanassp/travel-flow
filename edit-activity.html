<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelFlow - Schedule</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            
            <a href="index.html" class="logo-group">
                <div class="logo-placeholder">
                    <img src="icons/logo.svg" alt="TravelFlow Logo">
                </div>
                <span class="brand-name">TravelFlow</span>
            </a>
            
            <div class="user-profile-group">
                
                <a href="login.html" class="logout-btn" title="Logout">
                    <img src="icons/logout.svg" alt="Logout">
                </a>

                <a href="users.html" class="profile-placeholder" title="User Management">
                    <img src="icons/user.svg" alt="User Profile">
                </a>
            </div>

        </div>
    </header>

    <main class="content-wrapper">
        <section class="section-header">
            <div class="tabs-group">
                <button class="tab-btn active">Schedule</button>
                <span class="divider"></span>
                <button class="tab-btn">Budget</button>
            </div>
            
            <div class="controls-group">
                <select class="filter-select">
                    <option value="all">All Categories</option>
                    <option value="sightseeing" class="opt-sightseeing">● Sightseeing</option>
                    <option value="food" class="opt-food">● Food</option>
                    <option value="party" class="opt-party">● Party</option>
                </select>
                
                <button class="btn-add-event">+</button>
            </div>
        </section>

        <div class="calendar-scroll-container">
            <div class="calendar-grid">
                
                <div class="calendar-day-column">
                    <div class="day-header">June 10</div>
                    <div class="day-content"></div> 
                </div>

                <div class="calendar-day-column">
                    <div class="day-header">June 11</div>
                    <div class="day-content">
                        <article class="event-card">
                            <div class="event-row">
                                <h3 class="event-title">Museum of Art</h3>
                                <span class="event-price">$25</span>
                            </div>
                            <div class="event-row meta-info">
                                <span class="event-time">11:00 am</span>
                                <span class="category-tag sightseeing">Sightseeing</span>
                            </div>
                        </article>

                        <article class="event-card">
                            <div class="event-row">
                                <h3 class="event-title">Lunch at Bistro</h3>
                                <span class="event-price">$45</span>
                            </div>
                            <div class="event-row meta-info">
                                <span class="event-time">1:30 pm</span>
                                <span class="category-tag food">Food</span>
                            </div>
                        </article>
                    </div>
                </div>

                <div class="calendar-day-column">
                    <div class="day-header">June 12</div>
                    <div class="day-content">
                        <article class="event-card">
                            <div class="event-row">
                                <h3 class="event-title">City Bus Tour</h3>
                                <span class="event-price">$15</span>
                            </div>
                            <div class="event-row meta-info">
                                <span class="event-time">10:00 am</span>
                                <span class="category-tag sightseeing">Sightseeing</span>
                            </div>
                        </article>
                    </div>
                </div>

                <div class="calendar-day-column">
                    <div class="day-header">June 13</div>
                    <div class="day-content">
                         <article class="event-card">
                            <div class="event-row">
                                <h3 class="event-title">Roof Party</h3>
                                <span class="event-price">$60</span>
                            </div>
                            <div class="event-row meta-info">
                                <span class="event-time">9:00 pm</span>
                                <span class="category-tag party">Party</span>
                            </div>
                        </article>
                    </div>
                </div>

                <div class="calendar-day-column">
                    <div class="day-header">June 14</div>
                    <div class="day-content"></div>
                </div>

            </div>
        </div>
    </main>

    <div class="modal-overlay">
        <div class="form-modal-card">
            <div class="modal-header" style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                <h2 style="margin: 0;">Edit Activity</h2>
                <a href="trip-calendar.html" class="action-btn"><img src="icons/delete.svg" alt="Delete"></a>
            </div>
            
            <form class="form-content">
                <div class="fields-group">
                    
                    <div class="form-group">
                        <label>Activity Name</label>
                        <input type="text" value="Museum of Art" placeholder="e.g. Louvre Museum">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" value="2026-06-11" required>
                        </div>
                        <div class="form-group">
                            <label>Time (Optional)</label>
                            <input type="time" value="11:00">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <input list="categories" name="category" value="Sightseeing" placeholder="Sightseeing, Food, Party...">
                        <datalist id="categories">
                            <option value="Sightseeing">
                            <option value="Food">
                            <option value="Party">
                            <option value="Transport">
                            <option value="Stay">
                        </datalist>
                    </div>

                    <div class="form-group">
                        <label>Cost</label>
                        <input type="number" value="25" placeholder="0" min="0">
                    </div>

                    <div class="form-group">
                        <label>Notes & Links</label>
                        <textarea placeholder="Add location link, booking info or notes...">Tickets booked via website. Need to show QR code at the entrance. https://maps.app.goo.gl/museum</textarea>
                    </div>

                </div>

                <div class="form-footer">
                    <a href="trip-calendar.html" class="btn-secondary">Cancel</a>
                    <a href="trip-calendar.html" class="btn-ok">Save</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
